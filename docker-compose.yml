services:
  memory-mcp:
    build: .
    image: memory-mcp:latest
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - memory-mcp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost', 8000, timeout=5); c.request('GET', '/health'); assert c.getresponse().status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  memory-mcp-network:
    driver: bridge
